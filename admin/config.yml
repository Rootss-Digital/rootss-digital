backend:
  name: git-gateway
  branch: main

media_folder: "src/images"
public_folder: "/images"

collections:
  - name: "posts"
    label: "Blog Posts"
    folder: "src/blog/posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description (for SEO — 1 sentence)", name: "description", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - label: "Tags"
        name: "tags"
        widget: "list"
        default: ["posts"]
        hint: "Always include 'posts'. Add topic tags like: Google Business Profile, Local SEO, Social Media"
      - { label: "SEO Keywords (comma separated)", name: "keywords", widget: "string", required: false }
      - { label: "Layout", name: "layout", widget: "hidden", default: "post.njk" }
      - { label: "Body", name: "body", widget: "markdown" }
